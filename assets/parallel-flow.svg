<svg xmlns="http://www.w3.org/2000/svg" width="840" height="240" viewBox="0 0 840 240" role="img" aria-label="SSIS 并联执行示意图">
  <rect width="840" height="240" fill="#ffffff"/>
  <defs>
    <style>
      .box{fill:#f7fff5;stroke:#2da44e;stroke-width:2;rx:8;ry:8}
      .txt{font:14px 'Microsoft YaHei',Arial,sans-serif;fill:#113d1c}
      .arrow{stroke:#6e7781;stroke-width:2;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6e7781"/>
    </marker>
  </defs>

  <rect class="box" x="30" y="90" width="150" height="60"/>
  <text class="txt" x="105" y="125" text-anchor="middle">开始</text>

  <rect class="box" x="260" y="20" width="180" height="60"/>
  <text class="txt" x="350" y="55" text-anchor="middle">分支A：订单数据流</text>

  <rect class="box" x="260" y="90" width="180" height="60"/>
  <text class="txt" x="350" y="125" text-anchor="middle">分支B：库存数据流</text>

  <rect class="box" x="260" y="160" width="180" height="60"/>
  <text class="txt" x="350" y="195" text-anchor="middle">分支C：客户数据流</text>

  <rect class="box" x="620" y="90" width="180" height="60"/>
  <text class="txt" x="710" y="125" text-anchor="middle">汇总 / 结束</text>

  <line class="arrow" x1="180" y1="110" x2="255" y2="50"/>
  <line class="arrow" x1="180" y1="120" x2="255" y2="120"/>
  <line class="arrow" x1="180" y1="130" x2="255" y2="190"/>

  <line class="arrow" x1="440" y1="50" x2="615" y2="110"/>
  <line class="arrow" x1="440" y1="120" x2="615" y2="120"/>
  <line class="arrow" x1="440" y1="190" x2="615" y2="130"/>
</svg>
